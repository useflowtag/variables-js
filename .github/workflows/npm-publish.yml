name: Publish package to npm

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint:ci
      - name: Typecheck
        run: pnpm run typecheck
      - name: Build
        run: pnpm run build

      - name: Decide dist-tag
        id: meta
        shell: bash
        run: bash .github/scripts/decide-dist-tag.sh

      - name: Set package version (without git tag)
        shell: bash
        run: |
          npm version "${{ steps.meta.outputs.version }}" --no-git-tag-version

      - name: Publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --tag "${{ steps.meta.outputs.dist_tag }}"
