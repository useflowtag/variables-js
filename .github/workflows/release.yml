name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      - name: Authenticate with npm via OIDC
        run: |
          OIDC_TOKEN=$(curl -sH "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=npm" | jq -r .value)
          TOKEN=$(curl -sX POST https://registry.npmjs.org/-/npm/v1/login/oidc \
            -H 'Content-Type: application/json' \
            -d "{\"token\":\"${OIDC_TOKEN}\"}" | jq -r .token)
          echo "::add-mask::$TOKEN"
          echo "NODE_AUTH_TOKEN=$TOKEN" >> "$GITHUB_ENV"
          echo "NPM_TOKEN=$TOKEN" >> "$GITHUB_ENV"

      - run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
